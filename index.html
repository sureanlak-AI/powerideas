    function renderList() {
      const list = document.getElementById('articles-list');
      const view = document.getElementById('article-view');
      view.style.display = 'none';
      list.style.display = 'block';
      document.querySelector('.hero').style.display = '';
      
      list.innerHTML = articles.map(a => `
        <div class="article-card" onclick="showArticle('${a.slug}')">
          <span class="article-tag">${a.tag}</span>
          <h2>${a.title}</h2>
          <p>${a.excerpt}</p>
          <div class="article-meta">
            <span>📅 ${a.date}</span>
            <span>·</span>
            <span>⏱ ${a.readTime}</span>
          </div>
        </div>
      `).join('');
    }

    function showArticle(slug) {
      const article = articles.find(a => a.slug === slug);
      if (!article) return;
      
      document.getElementById('articles-list').style.display = 'none';
      document.querySelector('.hero').style.display = 'none';
      const view = document.getElementById('article-view');
      view.style.display = 'block';
      
      view.innerHTML = `
        <button class="back-btn" onclick="renderList()">← Volver</button>
        <div class="article-full">
          <span class="article-tag">${article.tag}</span>
          <h1>${article.title}</h1>
          <div class="article-meta" style="margin-bottom:24px">
            <span>📅 ${article.date}</span>
            <span>·</span>
            <span>⏱ ${article.readTime}</span>
          </div>
          <div class="content">${article.content}</div>
        </div>
      `;
      
      window.scrollTo(0, 0);
      history.pushState({slug}, '', '#' + slug);
    }

    window.addEventListener('popstate', () => {
      if (location.hash) {
        showArticle(location.hash.slice(1));
      } else {
        renderList();
      }
    });

    // Initial render
    if (location.hash) {
      showArticle(location.hash.slice(1));
    } else {
      renderList();
    }
